stages:
  - lint
  - security
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends tesseract-ocr -qq > /dev/null
    - python3 -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy bandit vulture pip-audit pytest pytest-cov semgrep

lint:ruff:
  stage: lint
  script:
    - ruff check .

lint:mypy:
  stage: lint
  script:
    - mypy .

lint:vulture:
  stage: lint
  script:
    - vulture . --min-confidence 80

security:bandit:
  stage: security
  script:
    - bandit -r . -x tests,.venv,venv

security:semgrep:
  stage: security
  script:
    - semgrep --config auto --error .

security:pip-audit:
  stage: security
  script:
    - pip-audit -r requirements.txt

test:pytest:
  stage: test
  script:
    - pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=50
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

release:changelog:
  stage: release
  image: orhunp/git-cliff:latest
  script:
    - git-cliff -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_TAG'
