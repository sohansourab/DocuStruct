stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends tesseract-ocr -qq > /dev/null
    - python3 -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy bandit vulture pip-audit pytest pytest-cov semgrep coverage

format:ruff:
  stage: format
  script:
    - ruff format --check .

lint:ruff:
  stage: lint
  script:
    - ruff check .

lint:vulture:
  stage: lint
  script:
    - vulture . --min-confidence 80

type_check:mypy:
  stage: type_check
  script:
    - mypy .

security:bandit:
  stage: security
  script:
    - bandit -r . -x tests,.venv,venv

security:semgrep:
  stage: security
  script:
    - semgrep --config auto --error .

security:pip-audit:
  stage: security
  script:
    - pip-audit -r requirements.txt

security:secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose --redact

test:pytest:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=50
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    paths:
      - coverage.xml
      - .coverage
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

coverage:report:
  stage: coverage
  needs: ["test:pytest"]
  script:
    - coverage report --fail-under=50
  coverage: '/TOTAL.*\s+(\d+%)$/'

release:changelog:
  stage: release
  image: orhunp/git-cliff:latest
  script:
    - git-cliff -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_TAG'