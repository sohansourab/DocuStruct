repos:
  # --- format ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
        name: ruff-format (check only)
        args: [--check]

  # --- lint ---
      - id: ruff
        name: ruff-lint
        args: [--fix]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.13
    hooks:
      - id: vulture
        args: ["--min-confidence", "80"]

  # --- type_check ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: []

  # --- security ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-r", ".", "--skip", "B101", "-x", "tests,.venv,venv"]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: python -m pip_audit -r requirements.txt
        language: python
        additional_dependencies: [pip-audit]
        pass_filenames: false

      - id: semgrep
        name: semgrep
        entry: semgrep --config auto --error .
        language: python
        additional_dependencies: [semgrep]
        pass_filenames: false